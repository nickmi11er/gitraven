name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    # Must match the federated credential on the Entra app (Entity: Environment).
    environment: release
    permissions:
      contents: write # attach the VSIX to the GitHub release
      id-token: write # OIDC token for azure/login
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test

      - name: Verify tag matches package.json version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "package.json version ($PKG) does not match tag ($TAG)" >&2
            exit 1
          fi

      - run: npx @vscode/vsce package

      # Entra workload identity federation — no stored marketplace secrets.
      # The app (client-id below) is a Contributor member of publisher mi11er.
      - uses: azure/login@v2
        with:
          client-id: dc59e939-1a4e-4da0-950a-ae4671f8c60c
          tenant-id: 8dab21e1-a7cc-4c04-9e54-b874b65f5044
          allow-no-subscriptions: true

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --azure-credential --packagePath gitraven-*.vsix

      - name: Publish to Open VSX
        run: npx ovsx publish gitraven-*.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Attach VSIX to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: gitraven-*.vsix
          generate_release_notes: true
