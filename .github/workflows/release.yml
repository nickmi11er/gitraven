name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach the VSIX to the GitHub release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test

      - name: Verify tag matches package.json version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "package.json version ($PKG) does not match tag ($TAG)" >&2
            exit 1
          fi

      - run: npx @vscode/vsce package

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath gitraven-*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: npx ovsx publish gitraven-*.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Attach VSIX to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: gitraven-*.vsix
          generate_release_notes: true
